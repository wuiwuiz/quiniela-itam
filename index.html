<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Quiniela ITAM Mundial 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f5;
  --muted: #7a7a8c;
  --accent: #1a5c38;
  --accent2: #a8c66c;
  --gold: #ffd60a;
  --green: #2dc653;
  --blue: #4cc9f0;
  --purple: #7b5ea7;
  --radius: 10px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Inter', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; font-size: 14px; } .emoji { font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif; }

/* ── AUTH SCREEN ── */
.auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; background: radial-gradient(ellipse at 50% 0%, rgba(26,92,56,0.15) 0%, transparent 60%); }
.auth-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; }
.auth-logo { font-family: var(--font-display); font-size: 36px; letter-spacing: 2px; color: var(--accent); text-align: center; margin-bottom: 4px; }
.auth-sub { text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2rem; }
.auth-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 3px; margin-bottom: 1.5rem; }
.auth-tab { flex: 1; padding: 7px; text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; border-radius: 6px; transition: all .2s; border: none; background: transparent; }
.auth-tab.active { background: var(--accent); color: #fff; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; transition: border .2s; }
.field input:focus { border-color: var(--accent); }
.btn { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; letter-spacing: 0.3px; }
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border2); }
.msg { font-size: 12px; text-align: center; margin-top: 12px; padding: 8px; border-radius: 6px; }
.msg.err { background: rgba(26,92,56,.15); color: #ff6b7a; }
.msg.ok { background: rgba(45,198,83,.15); color: var(--green); }

/* ── MAIN APP ── */
.app { display: none; flex-direction: column; min-height: 100vh; }
.app.visible { display: flex; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; height: 54px; background: var(--surface); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; }
.topbar-logo { font-family: var(--font-display); font-size: 22px; letter-spacing: 2px; color: var(--accent); }
.topbar-user { display: flex; align-items: center; gap: 8px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; text-transform: uppercase; }
.user-name { font-size: 13px; color: var(--muted); }
.admin-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; background: rgba(255,214,10,.15); color: var(--gold); border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
.logout-btn { font-size: 12px; color: var(--muted); cursor: pointer; border: none; background: none; padding: 4px 8px; border-radius: 4px; transition: color .2s; }
.logout-btn:hover { color: var(--text); }

/* ── TABS ── */
.tabs { display: flex; overflow-x: auto; background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0 1rem; gap: 0; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 12px 16px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .2s; letter-spacing: 0.3px; text-transform: uppercase; border: none; background: none; }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* ── CONTENT ── */
.content { flex: 1; padding: 1rem; max-width: 900px; margin: 0 auto; width: 100%; }
.section { display: none; }
.section.active { display: block; }

/* ── MATCH CARDS ── */
.phase-title { font-family: var(--font-display); font-size: 28px; letter-spacing: 2px; color: var(--muted); margin: 1.5rem 0 .75rem; }
.deadline-bar { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; background: var(--surface2); border-radius: 8px; margin-bottom: .75rem; font-size: 11px; }
.deadline-bar.open { border-left: 2px solid var(--green); color: var(--green); }
.deadline-bar.warn { border-left: 2px solid var(--accent2); color: var(--accent2); }
.deadline-bar.locked { border-left: 2px solid var(--accent); color: var(--accent); }
.match-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .85rem 1rem; margin-bottom: 8px; transition: border-color .2s; }
.match-card:hover { border-color: var(--border2); }
.match-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.grp-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: rgba(76,201,240,.12); color: var(--blue); letter-spacing: 0.5px; }
.elim-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: rgba(123,94,167,.15); color: var(--purple); }
.meta-txt { font-size: 10px; color: var(--muted); }
.match-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
.team-name { font-size: 13px; font-weight: 500; color: var(--text); }
.team-name.right { text-align: right; }
.score-wrap { display: flex; align-items: center; gap: 5px; }
.score-in { width: 36px; height: 36px; text-align: center; font-size: 16px; font-weight: 600; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 7px; color: var(--text); font-family: var(--font-body); -moz-appearance: textfield; transition: border .2s; }
.score-in::-webkit-inner-spin-button { display: none; }
.score-in:focus { outline: none; border-color: var(--accent); }
.score-in:disabled { opacity: 0.4; cursor: not-allowed; }
.score-in.real { border-color: var(--accent2); background: rgba(244,162,97,.1); }
.score-in.auto { border-color: var(--green); background: rgba(45,198,83,.08); cursor: not-allowed; }
.score-sep { font-size: 14px; color: var(--muted); font-weight: 600; }
.real-result { font-size: 11px; color: var(--green); text-align: center; margin-top: 5px; }
.pts-pill { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.pts-3 { background: rgba(45,198,83,.2); color: var(--green); }
.pts-1 { background: rgba(244,162,97,.2); color: var(--accent2); }
.pts-0 { background: rgba(255,255,255,.06); color: var(--muted); }

/* ── OTHERS PRONOS (result view) ── */
.others-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
.other-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.other-name { font-size: 9px; color: var(--muted); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 64px; text-align: center; }
.other-score { font-size: 11px; color: var(--text); }

/* ── TABLA ── */
.tabla-hdr { display: grid; grid-template-columns: 32px 1fr 42px 42px 42px 42px 50px 58px; gap: 4px; padding: 8px 12px; background: var(--surface2); border-radius: 8px; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.tabla-row { display: grid; grid-template-columns: 32px 1fr 42px 42px 42px 42px 50px 58px; gap: 4px; align-items: center; padding: 9px 12px; border-radius: 8px; margin-bottom: 3px; font-size: 12px; background: var(--surface); border: 0.5px solid var(--border); transition: border-color .2s; }
.tabla-row:hover { border-color: var(--border2); }
.tabla-row.gold { border-color: rgba(255,214,10,.3); background: rgba(255,214,10,.04); }
.tabla-row.silver { border-color: rgba(180,180,200,.2); }
.tabla-row.bronze { border-color: rgba(244,162,97,.2); }
.tabla-row.claude { border-color: rgba(123,94,167,.3); background: rgba(123,94,167,.06); }
.tabla-rank { font-weight: 600; font-size: 13px; }
.tabla-total { font-size: 15px; font-weight: 600; text-align: right; }
.r-center { text-align: center; }

/* ── CAMP section ── */
.camp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 8px; }
.camp-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .85rem; cursor: pointer; transition: all .2s; }
.camp-card:hover { border-color: var(--border2); }
.camp-card.selected { border-color: var(--gold); background: rgba(255,214,10,.06); }
.camp-card.disabled { opacity: 0.6; cursor: not-allowed; }
.camp-team { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.camp-pts-info { font-size: 10px; color: var(--muted); }
.pts-badges { display: flex; gap: 6px; margin-top: .75rem; }
.pts-badge { font-size: 11px; padding: 4px 10px; border-radius: 5px; font-weight: 500; }
.pts-gold { background: rgba(255,214,10,.15); color: var(--gold); }
.pts-silver { background: rgba(180,180,200,.1); color: #bbb; }
.pts-bronze { background: rgba(244,162,97,.15); color: var(--accent2); }

/* ── CLASIF section ── */
.clasif-grupo { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
.clasif-grp-head { background: rgba(76,201,240,.08); color: var(--blue); font-size: 11px; font-weight: 600; padding: 6px 12px; letter-spacing: 1px; }
.clasif-team { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-top: 0.5px solid var(--border); font-size: 13px; cursor: pointer; transition: background .15s; }
.clasif-team:hover { background: var(--surface2); }
.clasif-team.checked { background: rgba(45,198,83,.08); }
.clasif-team input { cursor: pointer; accent-color: var(--green); }
.clasif-wrap { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }

/* ── RESUMEN ── */
.resumen-box { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
.resumen-txt { font-size: 12px; line-height: 1.7; color: var(--text); white-space: pre-wrap; font-family: monospace; }
.copy-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(45,198,83,.15); color: var(--green); border: 0.5px solid rgba(45,198,83,.3); border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s; }
.copy-btn:hover { background: rgba(45,198,83,.25); }

/* ── CONFIG ── */
.config-section { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.config-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }
.config-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.config-label { font-size: 12px; color: var(--muted); width: 140px; flex-shrink: 0; }
.config-input { flex: 1; padding: 8px 12px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 7px; color: var(--text); font-family: var(--font-body); font-size: 13px; outline: none; }
.config-input:focus { border-color: var(--accent); }
.config-note { font-size: 11px; color: var(--muted); line-height: 1.6; padding: 8px 12px; background: rgba(255,255,255,.03); border-radius: 6px; margin-top: 8px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-dot.ok { background: var(--green); }
.status-dot.err { background: var(--accent); }
.status-dot.pend { background: var(--muted); }

/* ── SYNC BANNER ── */
.sync-banner { display: none; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(76,201,240,.08); border-bottom: 0.5px solid rgba(76,201,240,.2); font-size: 12px; color: var(--blue); }
.sync-banner.visible { display: flex; }
.spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── IP LOG ── */
.ip-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ip-table th { padding: 8px 10px; text-align: left; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 0.5px solid var(--border); }
.ip-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); }
.ip-table tr:last-child td { border-bottom: none; }

/* ── MISC ── */
.empty { text-align: center; color: var(--muted); padding: 3rem; font-size: 13px; }
.loading { text-align: center; color: var(--muted); padding: 2rem; }
.alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.alert-info { background: rgba(76,201,240,.08); color: var(--blue); border: 0.5px solid rgba(76,201,240,.2); }
.alert-warn { background: rgba(244,162,97,.08); color: var(--accent2); border: 0.5px solid rgba(244,162,97,.2); }
.alert-success { background: rgba(45,198,83,.08); color: var(--green); border: 0.5px solid rgba(45,198,83,.2); }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-header h2 { font-family: var(--font-display); font-size: 28px; letter-spacing: 2px; }
.btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 7px; background: var(--surface2); color: var(--text); border: 0.5px solid var(--border2); cursor: pointer; font-family: var(--font-body); transition: all .2s; width: auto; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.accent { background: rgba(26,92,56,.15); color: var(--accent); border-color: rgba(26,92,56,.3); }
.select { padding: 8px 12px; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 7px; color: var(--text); font-family: var(--font-body); font-size: 13px; outline: none; }
.standings-wrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; margin-bottom: 1.5rem; }
.standings-group { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.standings-group-hdr { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(26,92,56,0.15); border-bottom: 0.5px solid var(--border); }
.standings-group-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 2px; color: var(--accent); }
.standings-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.standings-table th { padding: 6px 10px; text-align: center; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 0.5px solid var(--border); font-weight: 500; }
.standings-table th:first-child { text-align: left; }
.standings-table td { padding: 7px 10px; border-bottom: 0.5px solid var(--border); text-align: center; color: var(--text); }
.standings-table td:first-child { text-align: left; font-weight: 500; }
.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr.qualified-1 td { background: rgba(26,92,56,0.12); }
.standings-table tr.qualified-2 td { background: rgba(26,92,56,0.06); }
.standings-table tr.qualified-3 td { background: rgba(244,162,97,0.06); }
.qual-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
.qual-1 { background: var(--accent); }
.qual-2 { background: var(--green); }
.qual-3 { background: var(--accent2); }
.rules-section { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 12px; }
.rules-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 2px; color: var(--accent); margin-bottom: 12px; }
.rules-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; align-items: flex-start; }
.rules-item:last-child { border-bottom: none; }
.rules-num { font-weight: 600; color: var(--accent); min-width: 24px; }
.rules-text { color: var(--text); line-height: 1.6; flex: 1; }
.rules-text b { color: var(--accent2); }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.sel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.sel-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .9rem 1rem; transition: border-color .2s; }
.sel-card:hover { border-color: var(--border2); }
.sel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.sel-flag { font-size: 28px; line-height: 1; font-family: 'Noto Color Emoji', 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif; }
.sel-info { flex: 1; }
.sel-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.sel-grupo { font-size: 10px; color: var(--muted); }
.sel-rank { text-align: right; }
.sel-rank-num { font-family: var(--font-display); font-size: 24px; color: var(--accent); letter-spacing: 1px; line-height: 1; }
.sel-rank-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.sel-pts { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.sel-form { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.form-dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; cursor: default; }
.form-w { background: rgba(45,198,83,.2); color: var(--green); border: 1px solid rgba(45,198,83,.4); }
.form-d { background: rgba(244,162,97,.2); color: var(--accent2); border: 1px solid rgba(244,162,97,.4); }
.form-l { background: rgba(230,57,70,.2); color: var(--accent); border: 1px solid rgba(230,57,70,.4); }
.form-loading { font-size: 10px; color: var(--muted); font-style: italic; }
.sel-search { width: 100%; padding: 10px 14px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; margin-bottom: 14px; }
.sel-search:focus { border-color: var(--accent); }
.sel-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.sel-filter-btn { padding: 4px 12px; font-size: 11px; font-weight: 500; border: 0.5px solid var(--border2); border-radius: 20px; background: transparent; color: var(--muted); cursor: pointer; transition: all .2s; }
.sel-filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.momios-section { margin-bottom: 1.5rem; }
.momios-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.momios-table th { padding: 8px 10px; text-align: center; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 0.5px solid var(--border); background: var(--surface2); }
.momios-table th:first-child { text-align: left; }
.momios-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); text-align: center; color: var(--text); }
.momios-table td:first-child { text-align: left; font-weight: 500; }
.momios-table tr:hover td { background: var(--surface2); }
.momios-table tr.highlight td { background: rgba(255,214,10,.04); }
.momio-val { font-weight: 600; font-family: var(--font-display); letter-spacing: 1px; font-size: 14px; }
.momio-hot { color: var(--gold); }
.momio-warm { color: var(--accent2); }
.momio-cool { color: var(--muted); }
.momio-cold { color: var(--border2); font-size: 11px; }
.partido-momio-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .85rem 1rem; margin-bottom: 8px; }
.partido-momio-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin-bottom: 8px; }
.momio-boxes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 8px; }
.momio-box { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 7px; padding: 6px 8px; text-align: center; }
.momio-box-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.momio-box-val { font-size: 15px; font-weight: 600; font-family: var(--font-display); letter-spacing: 1px; }
.momio-box.fav { border-color: var(--gold); }
.momio-box.fav .momio-box-val { color: var(--gold); }
.momios-note { font-size: 10px; color: var(--muted); text-align: center; margin-top: 8px; padding: 6px; background: var(--surface2); border-radius: 6px; }
.momios-filter { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.prono-filter-wrap { position: sticky; top: 54px; z-index: 90; background: var(--bg); padding: 8px 0 4px; border-bottom: 0.5px solid var(--border); margin-bottom: 12px; }
.prono-filter-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; align-items: center; }
.prono-filter-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; width: 60px; flex-shrink: 0; }
.pf-btn { padding: 4px 11px; font-size: 11px; font-weight: 500; border: 0.5px solid var(--border2); border-radius: 20px; background: transparent; color: var(--muted); cursor: pointer; transition: all .18s; white-space: nowrap; }
.pf-btn:hover { border-color: var(--accent); color: var(--accent); }
.pf-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.pf-btn.grp-btn.active { background: var(--surface2); color: var(--blue); border-color: var(--blue); }
.phase-pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-display); font-size: 22px; letter-spacing: 2px; color: var(--muted); margin: 1.2rem 0 .6rem; }
.phase-count { font-family: var(--font-body); font-size: 11px; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 20px; font-weight: 500; letter-spacing: 0; }
.no-matches { text-align: center; color: var(--muted); padding: 2rem; font-size: 13px; }
</style>
</head>

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
}

function showMsg(txt, type='err') {
  const el = document.getElementById('authMsg');
  el.innerHTML = `<div class="msg ${type}">${txt}</div>`;
}

async function doLogin() {
  if (!initSupabase()) { showMsg('Configura Supabase primero (habla con el admin)'); return; }
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) { showMsg('Completa todos los campos'); return; }
  const {data, error} = await sb.auth.signInWithPassword({email, password: pass});
  if (error) { showMsg('Credenciales incorrectas'); return; }
  await onLogin(data.user);
}

async function doRegister() {
  if (!initSupabase()) { showMsg('Configura Supabase primero'); return; }
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  if (!name || !email || !pass) { showMsg('Completa todos los campos'); return; }
  if (pass.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres'); return; }
  const {data, error} = await sb.auth.signUp({email, password: pass, options:{data:{display_name: name}}});
  if (error) { showMsg(error.message); return; }
  // Save profile
  await sb.from('profiles').upsert({id: data.user.id, email, display_name: name, is_admin: false, is_claude: false});
  showMsg('¡Cuenta creada! Ya puedes iniciar sesión.', 'ok');
  switchAuthTab('login');
}

async function onLogin(user) {
  currentUser = user;
  if (!initSupabase()) return;
  // Log IP (best effort)
  try {
    const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown');
    await sb.from('ip_logs').insert({user_id: user.id, email: user.email, ip_address: ip, logged_at: new Date().toISOString()});
  } catch(e){}

  const {data: profile} = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile || {display_name: user.email, is_admin: false};
  isAdmin = currentProfile.is_admin || user.email === ADMIN_EMAIL;

  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('visible');
  document.getElementById('avatarEl').textContent = (currentProfile.display_name||'?')[0].toUpperCase();
  document.getElementById('userNameEl').textContent = currentProfile.display_name || user.email;
  document.getElementById('adminBadge').style.display = isAdmin ? 'inline-block' : 'none';
  if (isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');

  await loadAll();
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

async function loadAll() {
  // Profiles
  const {data: profs} = await sb.from('profiles').select('*');
  allProfiles = profs || [];
  // Claude synthetic profile
  if (!allProfiles.find(p=>p.is_claude)) {
    allProfiles.push({id:'claude', display_name:'Claude 🤖', is_claude:true, is_admin:false});
  }

  // Pronos
  const {data: pronos} = await sb.from('pronos').select('*');
  allPronos = {};
  (pronos||[]).forEach(p => {
    if (!allPronos[p.match_id]) allPronos[p.match_id] = {};
    allPronos[p.match_id][p.user_id] = {h: p.home_goals, a: p.away_goals};
  });
  // Claude pronos
  Object.entries(CLAUDE_PRONOS).forEach(([mid,[h,a]]) => {
    if (!allPronos[mid]) allPronos[mid] = {};
    allPronos[mid]['claude'] = {h, a};
  });

  // Results
  const {data: results} = await sb.from('results').select('*');
  allResults = {};
  (results||[]).forEach(r => { allResults[r.match_id] = {h: r.home_goals, a: r.away_goals, ft90: r.ft90}; });

  // Camp
  const {data: camp} = await sb.from('camp_picks').select('*');
  allCamp = {};
  (camp||[]).forEach(c => { allCamp[c.user_id] = c.team; });
  allCamp['claude'] = CLAUDE_CAMP;

  // Clasif
  const {data: clasif} = await sb.from('clasif_picks').select('*');
  allClasif = {};
  (clasif||[]).forEach(c => { allClasif[c.user_id] = JSON.parse(c.teams||'[]'); });
  allClasif['claude'] = CLAUDE_CLASIF;

  // Camp real
  const {data: cr} = await sb.from('config').select('*').eq('key','camp_real').single();
  campReal = cr ? JSON.parse(cr.value||'{}') : {};

  renderPronos();
}

const NOW = new Date();
function jDL(j) { const d = new Date(JKICK[j-1]); d.setHours(d.getHours()-2); return d; }
function jSt(j) {
  if (j>3) return 'open';
  const dl=jDL(j), k=JKICK[j-1];
  if (NOW>=k) return 'locked'; if (NOW>=dl) return 'warn'; return 'open';
}
function elimDL(kick) { const d=new Date(kick); d.setHours(d.getHours()-2); return d; }
function mLocked(m) {
  if (m.fase==='grupos') return NOW>=jDL(m.jornada);
  return NOW>=elimDL(m.kick);
}

// ══════════════════════
// PUNTOS
// ══════════════════════
function getPts(matchId, userId) {
  const r = allResults[matchId];
  if (!r || r.h===null || r.h===undefined) return null;
  const p = (allPronos[matchId]||{})[userId];
  if (!p || p.h===null || p.h===undefined) return 0;
  const rh=+r.h, ra=+r.a, ph=+p.h, pa=+p.a;
  if (ph===rh && pa===ra) return 3;
  if (Math.sign(rh-ra)===Math.sign(ph-pa)) return 1;
  return 0;
}

function getCampPts(userId) {
  if (!campReal.pos1&&!campReal.pos2&&!campReal.pos3&&!campReal.pos4) return null;
  const pick = allCamp[userId];
  if (!pick) return 0;
  if (pick===campReal.pos1) return 8;
  if (pick===campReal.pos2) return 4;
  if (pick===campReal.pos3||pick===campReal.pos4) return 2;
  return 0;
}

function getClasifPts(userId) {
  const real = allClasif['real']||[];
  if (!real.length) return null;
  const pred = allClasif[userId]||[];
  return pred.filter(t=>real.includes(t)).length;
}

function getUserStats(userId) {
  let grp=0, elim=0, exactos=0, aciertos=0;
  [...GRP,...ELIM].forEach(m => {
    const mid = m[0];
    const pts = getPts(mid, userId);
    if (pts===null) return;
    const fase = m.length>5 ? (GRP.find(g=>g[0]===mid)?'grupos':'elim') : 'elim';
    const isGrp = GRP.find(g=>g[0]===mid);
    if (isGrp) grp+=pts; else elim+=pts;
    if (pts===3) exactos++;
    if (pts>=1) aciertos++;
  });
  const cp=getCampPts(userId), clp=getClasifPts(userId);
  const campPts=cp??0, clasifPts=clp??0;
  return {grp,elim,campPts,clasifPts,exactos,aciertos,total:grp+elim+campPts+clasifPts};
}

    jornadas.forEach(j => {
      let ms = GRP.filter(m => m[4]===j);
      if (pronoGrupo!=='todos') ms = ms.filter(m => m[1]===pronoGrupo);
      if (!ms.length) return;
      anyShown = true;

      const st = jSt(j);
      const dl = jDL(j).toLocaleString('es-MX',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      const locked = st==='locked'||st==='warn';

      html += `<div class="phase-pill">Jornada ${j} <span class="phase-count">${ms.length} partidos</span></div>
      <div class="deadline-bar ${st}" style="margin-bottom:10px">
        <span>${st==='locked'?'⛔ Cerrada — sin pronóstico = 0 pts':st==='warn'?'⚠ ¡Cierra pronto!':'🟢 Abierta'}</span>
        <span>Límite: ${dl} CDMX</span>
      </div>`;

      // Group by grupo if showing all groups
      if (pronoGrupo==='todos') {
        const byGrp = {};
        ms.forEach(m => { if(!byGrp[m[1]])byGrp[m[1]]=[]; byGrp[m[1]].push(m); });
        Object.entries(byGrp).forEach(([g,gms]) => {
          html += `<p style="font-size:11px;font-weight:600;color:var(--blue);letter-spacing:1px;margin:8px 0 4px;text-transform:uppercase">Grupo ${g}</p>`;
          gms.forEach(m => html += matchCardProno(m, uid, locked));
        });
      } else {
        ms.forEach(m => html += matchCardProno(m, uid, locked));
      }
    });

    if (!anyShown) html += `<div class="no-matches">No hay partidos para este filtro.</div>`;

  } else {
    // Fase eliminatoria
    const ms = ELIM.filter(m => m[1]===pronoView);
    const kick = ms[0]?.kick;
    const dl = kick ? new Date(new Date(kick).getTime()-2*3600000) : null;
    const locked = dl ? NOW>=dl : true;
    const dlStr = dl ? dl.toLocaleString('es-MX',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';

    html += `<div class="alert alert-info" style="margin-bottom:10px">
      Solo cuenta el resultado al final de los 90'+compensación. Puedes pronosticar empate.
    </div>
    <div class="deadline-bar ${locked?'locked':'open'}" style="margin-bottom:10px">
      <span>${locked?'⛔ Cerrada':'🟢 Abierta'}</span>
      <span>${dlStr?'Límite: '+dlStr+' CDMX':''}</span>
    </div>
    <div class="phase-pill">${pronoView} <span class="phase-count">${ms.length} partidos</span></div>`;
    ms.forEach(m => html += matchCardProno(m, uid, locked));
  }

  document.getElementById('sec-prono').innerHTML = html;
}

function setPronoView(v) { pronoView=v; pronoJornada='todas'; pronoGrupo='todos'; renderPronos(); }
function setPronoJornada(j) { pronoJornada=j; renderPronos(); }
function setPronoGrupo(g) { pronoGrupo=g; renderPronos(); }

function matchCardProno(m, uid, forceInfo=false) {
  const mid = m[0];
  const isGrp = m.length > 5;
  const home = isGrp ? m[2] : m[2];
  const away = isGrp ? m[3] : m[3];
  const fecha = isGrp ? m[5] : m[4];
  const hora  = isGrp ? m[6] : m[5];
  const sede  = isGrp ? m[7] : m[6];
  const locked = forceInfo || (isGrp ? NOW>=jDL(m[4]) : true);
  const p = (allPronos[mid]||{})[uid]||{h:'',a:''};
  const r = allResults[mid];
  const pts = r ? getPts(mid,uid) : null;
  let pill = '';
  if (pts===3) pill = `<span class="pts-pill pts-3">3 pts</span>`;
  else if (pts===1) pill = `<span class="pts-pill pts-1">1 pt</span>`;
  else if (pts===0&&r) pill = `<span class="pts-pill pts-0">0 pts</span>`;
  return `<div class="match-card">
    <div class="match-meta">
      <span class="grp-badge">Grupo ${isGrp?m[1]:m[1]}</span>
      ${!isGrp?'<span class="elim-badge">90\'+comp.</span>':''}
      <span class="meta-txt">📅 ${fecha}</span>
      <span class="meta-txt">🕐 ${hora} CDMX</span>
      <span class="meta-txt">📍 ${sede}</span>
      ${pill}
    </div>
    <div class="match-row">
      <span class="team-name">${flag(home)} ${home}</span>
      <div class="score-wrap">
        <input class="score-in" type="number" min="0" max="20" value="${p.h}" placeholder="-" ${locked?'disabled':''}
          oninput="saveProno(${mid},'h',this.value)">
        <span class="score-sep">–</span>
        <input class="score-in" type="number" min="0" max="20" value="${p.a}" placeholder="-" ${locked?'disabled':''}
          oninput="saveProno(${mid},'a',this.value)">
      </div>
      <span class="team-name right">${away} ${flag(away)}</span>
    </div>
    ${r?`<p class="real-result">Resultado real: ${r.h}–${r.a}</p>`:''}
  </div>`;
}

async function saveProno(matchId, side, val) {
  const uid = currentUser.id;
  if (!allPronos[matchId]) allPronos[matchId] = {};
  if (!allPronos[matchId][uid]) allPronos[matchId][uid] = {h:'', a:''};
  allPronos[matchId][uid][side] = val;
  await sb.from('pronos').upsert({user_id:uid, match_id:matchId, home_goals: allPronos[matchId][uid].h, away_goals: allPronos[matchId][uid].a}, {onConflict:'user_id,match_id'});
}

// ══════════════════════
// CLASIF
// ══════════════════════
function renderClasif() {
  const uid = currentUser.id;
  const dl = jDL(1);
  const locked = NOW >= dl;
  const dlStr = dl.toLocaleString('es-MX',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  const myPicks = allClasif[uid]||[];
  const real = allClasif['real']||[];
  const myPts = getClasifPts(uid);

  let html = `<div class="section-header"><h2>Clasificados a 16vos</h2></div>
  <div class="alert ${locked?'alert-warn':'alert-info'}" style="margin-bottom:1rem">
    ${locked?'⛔ Cerrado':'🟢 Selecciona los 32 equipos que crees que clasifican'} · Límite: ${dlStr} CDMX
  </div>`;
  if (myPts!==null) html += `<div class="alert alert-success" style="margin-bottom:1rem">Tus puntos: <strong>${myPts}/32</strong></div>`;
  html += `<p style="font-size:12px;color:var(--muted);margin-bottom:12px">${myPicks.length}/32 seleccionados</p>`;
  html += `<div class="clasif-wrap">`;
  Object.entries(GRUPOS).forEach(([g,teams]) => {
    html += `<div class="clasif-grupo"><div class="clasif-grp-head">GRUPO ${g}</div>`;
    teams.forEach(t => {
      const ck = myPicks.includes(t);
      const isReal = real.includes(t);
      html += `<label class="clasif-team ${ck?'checked':''}">
        <input type="checkbox" ${ck?'checked':''} ${locked?'disabled':''} onchange="toggleClasif('${t}',this.checked)">
        <span>${flag(t)} ${t}</span>
        ${isReal&&real.length?'<span style="color:var(--green);font-size:11px;margin-left:auto">✓</span>':''}
      </label>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  if (isAdmin) {
    html += `<p class="phase-title" style="margin-top:1.5rem">Clasificados reales (admin)</p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px">${real.length}/32 marcados</p>
    <div class="clasif-wrap">`;
    Object.entries(GRUPOS).forEach(([g,teams]) => {
      html += `<div class="clasif-grupo"><div class="clasif-grp-head">GRUPO ${g}</div>`;
      teams.forEach(t => {
        const ck = real.includes(t);
        html += `<label class="clasif-team ${ck?'checked':''}">
          <input type="checkbox" ${ck?'checked':''} onchange="toggleRealClasif('${t}',this.checked)">
          <span>${t}</span>
        </label>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }
  document.getElementById('sec-clasif').innerHTML = html;
}

async function toggleClasif(team, checked) {
  const uid = currentUser.id;
  if (!allClasif[uid]) allClasif[uid] = [];
  if (checked) {
    if (allClasif[uid].length>=32) { alert('Ya tienes 32 equipos'); return; }
    allClasif[uid].push(team);
  } else {
    allClasif[uid] = allClasif[uid].filter(t=>t!==team);
  }
  await sb.from('clasif_picks').upsert({user_id:uid, teams:JSON.stringify(allClasif[uid])},{onConflict:'user_id'});
  renderClasif();
}

async function toggleRealClasif(team, checked) {
  const real = allClasif['real']||[];
  if (checked) { if(real.length>=32){alert('Ya son 32');return;} real.push(team); }
  else allClasif['real'] = real.filter(t=>t!==team);
  allClasif['real'] = allClasif['real']||real;
  if(checked&&!allClasif['real'].includes(team)) allClasif['real'].push(team);
  await sb.from('config').upsert({key:'clasif_real', value:JSON.stringify(allClasif['real'])},{onConflict:'key'});
  renderClasif();
}

      <div style="display:flex;align-items:center;gap:8px">
        ${show?`<span style="font-size:13px;color:${isCl?'var(--purple)':'var(--text)'}">${pick||'—'}</span>`:'<span style="font-size:11px;color:var(--muted)">Oculto</span>'}
        ${show&&pts!==null?`<span class="pts-pill ${pts===8?'pts-3':pts>=2?'pts-1':'pts-0'}">${pts}pts</span>`:''}

async function selectCamp(team) {
  const uid = currentUser.id;

  renderCamp();
}

async function saveCampReal(pos, val) {
  campReal[pos] = val;
  await sb.from('config').upsert({key:'camp_real', value:JSON.stringify(campReal)},{onConflict:'key'});
  renderCamp();
}

    html += `<div class="section-header"><h2>Resultados</h2>
      <button class="btn-sm accent" onclick="fetchAPIFootball()">⟳ Actualizar desde API</button>

    <div class="alert alert-info" style="margin-bottom:1rem">Los resultados se sincronizan automáticamente con API-Football. Solo ingresa manualmente si hay algún error.</div>`;

      html += `<div class="match-card">
        <div class="match-meta">
          <span class="grp-badge">${isGrp?'Grupo '+m[1]:m[1]}</span>
          ${!isGrp?'<span class="elim-badge">90\'+comp.</span>':''}
          <span class="meta-txt">📅 ${fecha}</span>
          <span class="meta-txt">🕐 ${hora} CDMX</span>
          <span class="meta-txt">📍 ${sede}</span>
        </div>
        <div class="match-row">
          <span class="team-name">${flag(home)} ${home}</span>
          <div class="score-wrap">
            <input class="score-in ${r.h!==''?'auto':isAdmin?'real':''}" type="number" min="0" max="20"
              value="${r.h}" placeholder="-" ${!isAdmin||r.h!==''?'disabled':''}
              oninput="saveResult(${mid},'h',this.value)">
            <span class="score-sep">–</span>
            <input class="score-in ${r.a!==''?'auto':isAdmin?'real':''}" type="number" min="0" max="20"

}

async function saveResult(matchId, side, val) {
  if (!allResults[matchId]) allResults[matchId] = {h:'', a:''};
  allResults[matchId][side] = val;
  await sb.from('results').upsert({match_id:matchId, home_goals:allResults[matchId].h, away_goals:allResults[matchId].a, ft90:true},{onConflict:'match_id'});
}

// TABLA
// ══════════════════════
function renderTabla() {
  const uid = currentUser.id;
  const rows = allProfiles.map(p => ({...p, ...getUserStats(p.id)}));
  rows.sort((a,b) => {
    if (b.total!==a.total) return b.total-a.total;
    if (b.exactos!==a.exactos) return b.exactos-a.exactos;
    if (b.aciertos!==a.aciertos) return b.aciertos-a.aciertos;
    if (b.campPts!==a.campPts) return b.campPts-a.campPts;
    return 0;
  });

  let html = `<div class="section-header"><h2>Tabla general</h2></div>
  <div class="tabla-hdr">
    <span>#</span><span>Participante</span>
    <span class="r-center">Gpos</span><span class="r-center">Elim</span>
    <span class="r-center">Clas</span><span class="r-center">Camp</span>
    <span class="r-center">Exactos</span><span class="r-center">Total</span>
  </div>`;

  let rank=1;
  rows.forEach((r,i) => {
    if (i>0&&rows[i-1].total!==r.total) rank=i+1;
    const isMe = r.id===uid;
    const isCl = r.is_claude;
    const cls = rank===1?'gold':rank===2?'silver':rank===3?'bronze':isCl?'claude':'';
    const tied = rows.filter(x=>x.total===r.total).length>1;
    html += `<div class="tabla-row ${cls}" style="${isMe?'border-color:var(--accent)':''}">
      <span class="tabla-rank" style="color:${rank===1?'var(--gold)':rank===2?'#bbb':rank===3?'var(--accent2)':'var(--muted)'}">${rank}${tied?'=':''}</span>
      <span style="font-weight:${isMe?600:400};color:${isCl?'var(--purple)':isMe?'var(--text)':'var(--text)'}">${r.display_name}${isMe?' (yo)':''}</span>
      <span class="r-center">${r.grp}</span>
      <span class="r-center">${r.elim}</span>
      <span class="r-center">${r.clasifPts}</span>
      <span class="r-center">${r.campPts}</span>
      <span class="r-center">${r.exactos}</span>
      <span class="tabla-total" style="color:${rank===1?'var(--gold)':rank===2?'#bbb':rank===3?'var(--accent2)':'var(--text)'}">${r.total}</span>
    </div>`;
  });
  html += `<p style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center">Desempate: 1) Exactos · 2) Aciertos · 3) Pts campeón · 4) Inscripción más antigua</p>`;
  document.getElementById('sec-tabla').innerHTML = html;
}

// ══════════════════════
// RESUMEN DEL DÍA
// ══════════════════════
function renderResumen() {
  const hoy = new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
  const todayMatches = [...GRP,...ELIM].filter(m => {
    const r = allResults[m[0]];
    return r && r.h !== '' && r.h !== null;
  });

  if (!todayMatches.length) {
    document.getElementById('sec-resumen').innerHTML = `<div class="section-header"><h2>Resumen del día</h2></div><div class="empty">No hay resultados capturados aún.</div>`;
    return;
  }

  // Build message
  let msg = `🏆 *QUINIELA QUINIELA ITAM*\n`;
  msg += `📅 Resumen ${hoy}\n`;
  msg += `${'─'.repeat(30)}\n\n`;

  msg += `⚽ *RESULTADOS DEL DÍA*\n`;
  todayMatches.forEach(m => {
    const r = allResults[m[0]];
    const isGrp = m.length>5;
    const home=m[2],away=m[3];
    msg += `• ${flag(home)} ${home} ${r.h}–${r.a} ${away} ${flag(away)}\n`;
  });
  msg += `\n`;

  msg += `🎯 *PUNTOS GANADOS HOY*\n`;
  const rows = allProfiles.map(p => {
    let ptsHoy = 0;
    todayMatches.forEach(m => {
      const pts = getPts(m[0],p.id);
      if (pts!==null) ptsHoy+=pts;
    });
    return {...p, ptsHoy};
  }).sort((a,b)=>b.ptsHoy-a.ptsHoy);
  rows.forEach(r => {
    msg += `• ${r.display_name}: +${r.ptsHoy} pts\n`;
  });
  msg += `\n`;

  msg += `📊 *TABLA GENERAL*\n`;
  const tabla = allProfiles.map(p=>({...p,...getUserStats(p.id)}));
  tabla.sort((a,b)=>{
    if(b.total!==a.total)return b.total-a.total;
    if(b.exactos!==a.exactos)return b.exactos-a.exactos;
    return b.aciertos-a.aciertos;
  });
  const medals=['🥇','🥈','🥉'];
  tabla.forEach((r,i)=>{
    const med=medals[i]||`${i+1}.`;
    msg+=`${med} ${r.display_name}: ${r.total} pts (${r.exactos} exactos)\n`;
  });
  msg += `\n_¡Mañana más acción!_ ⚽`;

  document.getElementById('sec-resumen').innerHTML = `
    <div class="section-header"><h2>Resumen del día</h2>
      <button class="copy-btn" onclick="copyResumen()">📋 Copiar para WhatsApp</button>
    </div>
    <div class="resumen-box">
      <pre class="resumen-txt" id="resumenTxt">${msg}</pre>
    </div>
    <p style="font-size:11px;color:var(--muted)">Copia este mensaje y pégalo en tu grupo de WhatsApp.</p>`;
}

function copyResumen() {
  const txt = document.getElementById('resumenTxt').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copiado';
    setTimeout(()=>btn.textContent='📋 Copiar para WhatsApp',2000);
  });
}

// API-FOOTBALL SYNC
// ══════════════════════
async function fetchAPIFootball() {
  if (!API_FOOTBALL_KEY) { alert('Configura tu API Key de API-Football en el panel de configuración'); return; }
  const banner = document.getElementById('syncBanner');
  banner.classList.add('visible');
  try {
    // API-Football ID for FIFA World Cup 2026 = 1 (season 2026)
    const res = await fetch('https://v3.football.api-sports.io/fixtures?league=1&season=2026&status=FT', {
      headers: {'x-apisports-key': API_FOOTBALL_KEY}
    });
    const data = await res.json();
    if (!data.response) throw new Error('Sin datos');
    let updated = 0;
    for (const fix of data.response) {
      const home = fix.teams.home.name;
      const away = fix.teams.away.name;
      // Match by team names (normalize)
      const match = [...GRP,...ELIM].find(m => {
        const mh=normalize(m[2]), ma=normalize(m[3]);
        return normalize(home)===mh && normalize(away)===ma;
      });
      if (!match) continue;
      const mid = match[0];
      // ft90 = fulltime regulation (score.fulltime, not penalty/extra)
      const sh = fix.score.fulltime.home;
      const sa = fix.score.fulltime.away;
      if (sh===null) continue;
      allResults[mid] = {h:sh, a:sa, ft90:true};
      await sb.from('results').upsert({match_id:mid, home_goals:sh, away_goals:sa, ft90:true},{onConflict:'match_id'});
      updated++;
    }
    alert(`✓ Sincronizado: ${updated} resultados actualizados`);
    renderResultados();
  } catch(e) {
    alert('Error al conectar con API-Football: '+e.message);
  } finally {
    banner.classList.remove('visible');
  }
}

function normalize(str) {
  return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
}

async function saveSbConfig() {

async function loadIpLogs() {
  const {data} = await sb.from('ip_logs').select('*').order('logged_at',{ascending:false}).limit(50);
  if (!data) return;
  let html = `<table class="ip-table"><thead><tr>
    <th>Usuario</th><th>Email</th><th>IP</th><th>Fecha</th>
  </tr></thead><tbody>`;
  data.forEach(r => {
    html += `<tr><td>${r.email||'—'}</td><td>${r.email||'—'}</td><td style="font-family:monospace">${r.ip_address}</td><td>${new Date(r.logged_at).toLocaleString('es-MX')}</td></tr>`;

// GRUPOS FIFA STANDINGS
// ══════════════════════
function calcStandings() {
  const standings = {};
  Object.entries(GRUPOS).forEach(([g, teams]) => {
    standings[g] = {};
    teams.forEach(t => {
      standings[g][t] = {pts:0, pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, gd:0};
    });
  });
  GRP.forEach(m => {
    const mid=m[0], grupo=m[1], home=m[2], away=m[3];
    const r = allResults[mid];
    if (!r || r.h==='' || r.h===null || r.h===undefined) return;
    const gh=parseInt(r.h), ga=parseInt(r.a);
    const sh=standings[grupo][home], sa=standings[grupo][away];
    if (!sh||!sa) return;
    sh.pj++; sa.pj++;
    sh.gf+=gh; sh.gc+=ga; sh.gd+=(gh-ga);
    sa.gf+=ga; sa.gc+=gh; sa.gd+=(ga-gh);
    if(gh>ga){sh.pts+=3;sh.pg++;sa.pp++;}
    else if(gh===ga){sh.pts+=1;sh.pe++;sa.pts+=1;sa.pe++;}
    else{sa.pts+=3;sa.pg++;sh.pp++;}
  });
  return standings;
}

function headToHead(teams, grupo) {
  const r={pts:{},gd:{},gf:{}};
  teams.forEach(t=>{r.pts[t]=0;r.gd[t]=0;r.gf[t]=0;});
  GRP.forEach(m=>{
    const mid=m[0],g=m[1],home=m[2],away=m[3];
    if(g!==grupo||!teams.includes(home)||!teams.includes(away)) return;
    const res=allResults[mid];
    if(!res||res.h===''||res.h===null) return;
    const gh=parseInt(res.h),ga=parseInt(res.a);
    r.gf[home]+=gh;r.gf[away]+=ga;
    r.gd[home]+=(gh-ga);r.gd[away]+=(ga-gh);
    if(gh>ga) r.pts[home]+=3;
    else if(gh===ga){r.pts[home]+=1;r.pts[away]+=1;}
    else r.pts[away]+=3;
  });
  return r;
}

function sortGroup(teams, grupo, standings) {
  return teams.slice().sort((a,b) => {
    const sa=standings[grupo][a], sb=standings[grupo][b];
    if(sb.pts!==sa.pts) return sb.pts-sa.pts;
    const hh=headToHead([a,b],grupo);
    if(hh.pts[b]!==hh.pts[a]) return hh.pts[b]-hh.pts[a];
    if(hh.gd[b]!==hh.gd[a]) return hh.gd[b]-hh.gd[a];
    if(hh.gf[b]!==hh.gf[a]) return hh.gf[b]-hh.gf[a];
    if(sb.gd!==sa.gd) return sb.gd-sa.gd;
    if(sb.gf!==sa.gf) return sb.gf-sa.gf;
    return 0;
  });
}

function renderGrupos() {
  const standings = calcStandings();
  let html = `<div class="section-header"><h2>Grupos</h2>
    <button class="btn-sm" onclick="renderGrupos()">↻ Actualizar</button>
  </div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px">
    <div class="legend-row"><span class="qual-dot qual-1"></span>1° lugar — clasifica</div>
    <div class="legend-row"><span class="qual-dot qual-2"></span>2° lugar — clasifica</div>
    <div class="legend-row"><span class="qual-dot qual-3"></span>3° lugar — posible mejor tercero</div>
  </div>
  <div class="standings-wrap">`;

  Object.entries(GRUPOS).forEach(([g, teams]) => {
    const sorted = sortGroup(teams, g, standings);
    html += `<div class="standings-group">
      <div class="standings-group-hdr">
        <span class="standings-group-title">GRUPO ${g}</span>
      </div>
      <table class="standings-table"><thead><tr>
        <th style="text-align:left;width:42%">Selección</th>
        <th>PJ</th><th>PG</th><th>PE</th><th>PP</th>
        <th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
      </tr></thead><tbody>`;
    sorted.forEach((team, idx) => {
      const s = standings[g][team];
      const rowCls = idx===0?'qualified-1':idx===1?'qualified-2':idx===2?'qualified-3':'';
      const dotCls = idx===0?'qual-1':idx===1?'qual-2':idx===2?'qual-3':'';
      const gdStr = s.gd>0?'+'+s.gd:String(s.gd);
      const gdColor = s.gd>0?'var(--green)':s.gd<0?'var(--accent)':'var(--muted)';
      const ptsColor = idx===0?'var(--gold)':idx===1?'var(--green)':'var(--text)';
      html += `<tr class="${rowCls}">
        <td><span class="qual-dot ${dotCls}"></span>${flag(team)} ${team}</td>
        <td>${s.pj}</td><td>${s.pg}</td><td>${s.pe}</td><td>${s.pp}</td>
        <td>${s.gf}</td><td>${s.gc}</td>
        <td style="color:${gdColor}">${gdStr}</td>
        <td style="font-weight:700;font-size:14px;color:${ptsColor}">${s.pts}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  html += `</div>
  <div class="alert alert-info" style="margin-top:4px;font-size:11px">
    Desempate FIFA: 1) Pts entre sí · 2) DG entre sí · 3) GF entre sí · 4) DG general · 5) GF general · 6) Fair Play · 7) Ranking FIFA
  </div>`;
  document.getElementById('sec-grupos').innerHTML = html;
}

let formCache = {}; // cache para no repetir llamadas

async function fetchForm(teamName) {
  if (formCache[teamName]) return formCache[teamName];
  if (!API_FOOTBALL_KEY) return null;
  
  // Map team name to API-Football team ID
  const teamMap = {
    'España':9,'Argentina':26,'Francia':2,'Inglaterra':10,'Brasil':6,
    'Portugal':27,'Países Bajos':1118,'Bélgica':1,'Alemania':25,
    'Uruguay':30,'Colombia':6,'Marruecos':32,'Croacia':3,'México':16,
    'Estados Unidos':2,'Japón':15,'Senegal':25,'Suiza':15,'Austria':44,
    'Australia':25,'Noruega':22,'Ecuador':24,'Corea del Sur':13,
    'Escocia':29,'Canadá':1569,'Qatar':1,'Irán':28,'Egipto':21,
    'Arabia Saudita':36,'Túnez':1438,'Paraguay':6,'Ghana':23,
    'Sudáfrica':18,'Panamá':1580,'Haití':1567,'Curazao':4737,
    'Argelia':1569,'Jordania':1567,'Uzbekistán':25,'Costa de Marfil':1447,
    'Cabo Verde':1500,'Nueva Zelanda':18
  };

  const id = teamMap[teamName];
  if (!id) return null;

  try {
    const res = await fetch(`https://v3.football.api-sports.io/teams/statistics?team=${id}&season=2025&league=1`, {
      headers: {'x-apisports-key': API_FOOTBALL_KEY}
    });
    if (!res.ok) return null;
    const data = await res.json();
    // fallback: get last matches
    const res2 = await fetch(`https://v3.football.api-sports.io/fixtures?team=${id}&last=10&type=national`, {
      headers: {'x-apisports-key': API_FOOTBALL_KEY}
    });
    const d2 = await res2.json();
    if (!d2.response || !d2.response.length) return null;
    
    const form = d2.response.slice(-10).map(fix => {
      const isHome = fix.teams.home.id === id;
      const hg = fix.goals.home, ag = fix.goals.away;
      if (hg === null) return null;
      if (isHome) return hg > ag ? 'W' : hg === ag ? 'D' : 'L';
      return ag > hg ? 'W' : ag === hg ? 'D' : 'L';
    }).filter(Boolean);
    
    formCache[teamName] = form;
    return form;
  } catch(e) { return null; }
}

function formDot(r) {
  if (!r) return '';
  const cls = r==='W'?'form-w':r==='D'?'form-d':'form-l';
  const lbl = r==='W'?'G':r==='D'?'E':'P';
  return `<span class="form-dot ${cls}" title="${r==='W'?'Ganó':r==='D'?'Empató':'Perdió'}">${lbl}</span>`;
}

function momioColor(m) {
  if (!m) return 'momio-cool';
  const n = parseInt(m.replace('+',''));
  if (m.startsWith('-')) return 'momio-hot';
  if (n <= 300) return 'momio-hot';
  if (n <= 800) return 'momio-warm';
  if (n <= 3000) return 'momio-cool';
  return 'momio-cold';
}

function impliedProb(m) {
  if (!m) return '—';
  const n = parseInt(m.replace('+',''));
  let prob;
  if (m.startsWith('-')) prob = Math.abs(n) / (Math.abs(n) + 100);
  else prob = 100 / (n + 100);
  return (prob * 100).toFixed(0) + '%';
}

    // Table view for campeon / grupo1 / 16vos
    const dataMap = momiosView==='campeon'?MOMIOS_CAMPEON:momiosView==='grupo1'?MOMIOS_GRUPO1:MOMIOS_16VOS;
    const lbl = momiosView==='campeon'?'Campeón del mundo':momiosView==='grupo1'?'1° lugar de grupo':'Clasificar a 16vos';
    const teams = [...new Set(Object.values(GRUPOS).flat())];
    // Sort by implied probability (favorites first)
    const sorted = teams.slice().sort((a,b) => {
      const ma = dataMap[a]||'+99999', mb = dataMap[b]||'+99999';
      const pa = ma.startsWith('-')?Math.abs(parseInt(ma))/(Math.abs(parseInt(ma))+100):100/(parseInt(ma.replace('+',''))+100);
      const pb = mb.startsWith('-')?Math.abs(parseInt(mb))/(Math.abs(parseInt(mb))+100):100/(parseInt(mb.replace('+',''))+100);
      return pb - pa;
    });

    html += `<div class="momios-section">
    <table class="momios-table">
      <thead><tr>
        <th style="text-align:left">#</th>
        <th style="text-align:left">Selección</th>
        <th>Grupo</th>
        <th>${lbl}</th>
        <th>Prob. implícita</th>
      </tr></thead><tbody>`;

    sorted.forEach((team,i) => {
      const m = dataMap[team]||'—';
      const g = grupos[team]||'—';
      const cls = i < 3 ? 'highlight' : '';
      html += `<tr class="${cls}">
        <td style="color:var(--muted);font-size:11px">${i+1}</td>
        <td>${flag(team,16)} ${team}</td>
        <td><span class="grp-badge">Grupo ${g}</span></td>
        <td><span class="momio-val ${momioColor(m)}">${m}</span></td>
        <td style="color:var(--muted)">${impliedProb(m)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  html += `<div class="momios-note">
    Momios americanos (+/-). Positivo = ganancia por cada $100 apostados. Negativo = cuánto apostar para ganar $100. 
    Fuente: BetMGM / FanDuel · 28 mar 2026 · Solo informativo.
  </div>`;

  document.getElementById('sec-momios').innerHTML = html;
}

function setMomiosView(v) { momiosView=v; renderMomios(); }
function setMomiosGrupo(g) { momiosGrupoFilter=g; renderMomios(); }

window.onload = async () => {
  // Try auto-login if Supabase configured
  if (initSupabase()) {
    const {data:{session}} = await sb.auth.getSession();
    if (session?.user) {
      await onLogin(session.user);
      return;
    }
  }
  // Show auth screen — if no Supabase configured show config hint
  if (!SUPABASE_URL) {
    document.getElementById('authMsg').innerHTML = `<div class="msg err">Esta app necesita configurarse. Si eres el administrador, <a href="#" onclick="showAdminSetup()" style="color:var(--accent)">haz clic aquí</a>.</div>`;
  }
};

function showAdminSetup() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('visible');
  isAdmin = true;
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');
  document.getElementById('avatarEl').textContent='A';
  document.getElementById('userNameEl').textContent='Admin Setup';
  document.getElementById('adminBadge').style.display='inline-block';
  showTab('config');
  renderConfig();
}
</script>
